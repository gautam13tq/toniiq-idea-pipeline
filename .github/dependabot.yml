# Dependabot — supply-chain-aware update schedule.
# Cooldown mirrors the local .npmrc min-release-age=3 so PRs don't bypass
# the cooldown the developer machine enforces.
# Anchored 2026-05-12 after the Mini Shai-Hulud/TanStack npm compromise.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
